<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>校园兼职信息平台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "微软雅黑", sans-serif;
        }
        body {
            background-color: #f5f7fa;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }
        h1 {
            color: #2c3e50;
            text-align: center;
            margin-bottom: 30px;
        }
        .job-card {
            background: white;
            padding: 20px;
            margin: 15px 0;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .job-title {
            font-size: 18px;
            font-weight: bold;
            color: #2980b9;
            margin-bottom: 10px;
        }
        .job-detail {
            margin: 8px 0;
            color: #555;
        }
        .form-link {
            display: block;
            text-align: center;
            background: #27ae60;
            color: white;
            padding: 15px;
            border-radius: 8px;
            text-decoration: none;
            font-size: 18px;
            margin-top: 30px;
            transition: background 0.3s;
        }
        .form-link:hover {
            background: #2ecc71;
        }
    </style>
</head>
<body>
    <h1>📋 校园兼职信息平台</h1>

    <!-- 这里是示例兼职信息，你可以随时修改/新增/删除 -->
    <div class="job-card">
        <div class="job-title">1. 周末家教（数理化）</div>
        <div class="job-detail">📍 地点：学校附近</div>
        <div class="job-detail">⏰ 时间：周末全天</div>
        <div class="job-detail">💰 薪资：80-120元/小时</div>
        <div class="job-detail">📝 要求：高中/大学在读，成绩优异，有家教经验优先</div>
    </div>

    <div class="job-card">
        <div class="job-title">2. 奶茶店兼职店员</div>
        <div class="job-detail">📍 地点：学校南门商业街</div>
        <div class="job-detail">⏰ 时间：每天16:00-22:00（可排班）</div>
        <div class="job-detail">💰 薪资：15元/小时 + 提成</div>
        <div class="job-detail">📝 要求：态度好，能长期做，每周至少3天</div>
    </div>

    <div class="job-card">
        <div class="job-title">3. 校园代理（文创产品）</div>
        <div class="job-detail">📍 地点：校内/线上</div>
        <div class="job-detail">⏰ 时间：自由安排</div>
        <div class="job-detail">💰 薪资：按件提成，月入上不封顶</div>
        <div class="job-detail">📝 要求：有一定销售能力，在校学生优先</div>
    </div>

    </a >

</body>
</html>
